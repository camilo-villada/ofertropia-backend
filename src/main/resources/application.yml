  # Configuración para Swagger (Documentación)
  springdoc:
    swagger-ui:
      path: /swagger-ui.html

  # Configuración para Gemini API
  gemini:
    api:
      # Lee la API key desde variable de entorno. Si falta, queda vacío (y el servicio debe manejarlo).
      key: ${GEMINI_API_KEY:}
      url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent