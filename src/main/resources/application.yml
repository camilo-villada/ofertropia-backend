  spring:
    application:
      name: ofertropia-backend

    # --- Configuración H2 para desarrollo local ---
    datasource:
      url: jdbc:h2:mem:ofertropia_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
      driver-class-name: org.h2.Driver
      username: sa
      password: ""
    jpa:
      database-platform: org.hibernate.dialect.H2Dialect
      hibernate:
        ddl-auto: update # O usa 'create-drop' si prefieres que se borre al cerrar
      show-sql: true
      properties:
        hibernate:
          '[format_sql]': true
          '[highlight_sql]': true

    h2:
      console:
        enabled: true
        path: /h2-console



